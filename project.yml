name: QuietBox
options:
  bundleIdPrefix: com.ggsheng
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: 9L6N2ZF26B
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  QuietBox:
    type: application
    platform: iOS
    sources:
      - path: QuietBox
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        INFOPLIST_FILE: QuietBox/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.ggsheng.QuietBox
        PRODUCT_NAME: QuietBox
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: NO
        SWIFT_EMIT_LOC_STRINGS: YES
        CODE_SIGN_ENTITLEMENTS: QuietBox/QuietBox.entitlements
        CODE_SIGN_STYLE: Automatic
        CODE_SIGNING_ALLOWED: NO
        DEVELOPMENT_TEAM: 9L6N2ZF26B
      configs:
        Debug:
          CODE_SIGNING_ALLOWED: NO
        Release:
          CODE_SIGNING_ALLOWED: YES
    entitlements:
      path: QuietBox/QuietBox.entitlements

  QuietBoxTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: QuietBoxTests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: QuietBox
    settings:
      base:
        INFOPLIST_FILE: QuietBoxTests/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.ggsheng.QuietBoxTests
        PRODUCT_NAME: QuietBoxTests
        GENERATE_INFOPLIST_FILE: NO
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/QuietBox.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/QuietBox"
        BUNDLE_LOADER: "$(TEST_HOST)"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 9L6N2ZF26B

  QuietBoxUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: QuietBoxUITests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: QuietBox
    settings:
      base:
        INFOPLIST_FILE: QuietBoxUITests/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.ggsheng.QuietBoxUITests
        PRODUCT_NAME: QuietBoxUITests
        GENERATE_INFOPLIST_FILE: NO
        TEST_TARGET: "$(BUILT_PRODUCTS_DIR)/QuietBox.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/QuietBox"
        CODE_SIGN_ENTITLEMENTS: ""
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 9L6N2ZF26B

schemes:
  QuietBox:
    build:
      targets:
        QuietBox: all
        QuietBoxUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - QuietBoxUITests
    archive:
      config: Release